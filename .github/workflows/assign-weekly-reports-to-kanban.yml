name: Assign Weekly Reports to Kanban

on:
  push:
    branches:
      - copilot/assign-weekly-reports-to-kanban
  workflow_dispatch:

permissions:
  issues: read
  repository-projects: write

jobs:
  assign-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assign weekly report issues to BadBuy kanban project sprints
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/assign_to_kanban.py
