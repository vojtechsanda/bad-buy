name: Push Main Checks

on:
  push:
    branches: ['feature/expo-pipeline-main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_code:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: expo/expo-github-action@v8
        with:
          packager: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prettier
        run: pnpm prettier --check .
      - name: ESLint
        run: pnpm lint

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze_code]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: expo/expo-github-action@v8
        with:
          packager: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: node_modules/.cache/metro
          key: ${{ runner.os }}-metro-web-${{ hashFiles('.nvmrc') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-metro-web-${{ hashFiles('.nvmrc') }}-
      - run: pnpm build:web

  build_ios:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: [analyze_code]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: expo/expo-github-action@v8
        with:
          packager: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: node_modules/.cache/metro
          key: ${{ runner.os }}-metro-ios-${{ hashFiles('.nvmrc') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-metro-ios-${{ hashFiles('.nvmrc') }}-
      - run: pnpm build:ios

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze_code]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: expo/expo-github-action@v8
        with:
          packager: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: node_modules/.cache/metro
          key: ${{ runner.os }}-metro-android-${{ hashFiles('.nvmrc') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-metro-android-${{ hashFiles('.nvmrc') }}-
      - run: pnpm build:android
