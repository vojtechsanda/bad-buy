name: PR Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze_code:
    name: Code Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create .env file from repository secrets
        run: echo '${{ secrets.DOTENV_FILE_CONTENT }}' > .env
        shell: bash

      - run: pnpm install --frozen-lockfile

      - name: Expo Doctor
        run: npx expo-doctor

      - name: Prettier
        run: pnpm prettier --check .

      - name: ESLint
        run: pnpm lint

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze_code]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create .env file from repository secrets
        run: echo '${{ secrets.DOTENV_FILE_CONTENT }}' > .env
        shell: bash

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: node_modules/.cache/metro
          key: ${{ runner.os }}-metro-${{ hashFiles('.nvmrc') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-metro-${{ hashFiles('.nvmrc') }}-

      - run: pnpm build:web
