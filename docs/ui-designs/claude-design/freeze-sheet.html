<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Freeze Sheet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen" style="position: relative; overflow: hidden">
            <!-- Faux audit backdrop -->
            <div style="height: 100%; background: var(--bb-bg); padding: 56px 20px 0">
              <div
                style="
                  font: 700 18px/1.2 var(--bb-font-sans);
                  color: var(--bb-text-primary);
                  text-align: center;
                "
              >
                Audit
              </div>
              <div class="sp-6"></div>
              <div style="font: 700 32px/1.1 var(--bb-font-sans); color: var(--bb-text-primary)">
                €89.00
              </div>
              <div class="sp-6"></div>
              <div class="card alt" style="height: 96px"></div>
            </div>

            <div class="sheet-backdrop"></div>
            <div class="sheet" style="height: 70%">
              <div class="handle"></div>

              <div
                style="
                  flex: 1;
                  overflow: auto;
                  padding: 12px 0 0;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div
                  style="
                    font: 700 22px/1.25 var(--bb-font-sans);
                    letter-spacing: -0.01em;
                    color: var(--bb-text-primary);
                  "
                >
                  Freeze this decision
                </div>
                <div style="height: 20px"></div>

                <div style="display: flex; flex-direction: column; gap: 8px">
                  <span
                    style="font: 400 14px/1.4 var(--bb-font-sans); color: var(--bb-text-secondary)"
                    >Name it</span
                  >
                  <div class="text-input">
                    <input value="Wireless headphones" style="font-weight: 400" />
                  </div>
                </div>

                <div class="sp-6"></div>
                <div style="font: 600 16px/1.45 var(--bb-font-sans); color: var(--bb-text-primary)">
                  Decide in…
                </div>
                <div class="sp-3"></div>

                <div style="display: flex; flex-wrap: wrap; gap: 8px">
                  <button class="chip" style="padding: 0 16px">30 minutes</button>
                  <button class="chip" style="padding: 0 16px">6 hours</button>
                  <button class="chip selected" style="padding: 0 16px">1 day</button>
                  <button class="chip" style="padding: 0 16px">1 week</button>
                </div>

                <div class="sp-4"></div>

                <button
                  style="
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    padding: 12px 16px;
                    background: var(--bb-surface-alt);
                    border: 0;
                    border-radius: 12px;
                    cursor: pointer;
                    width: 100%;
                    text-align: left;
                  "
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="var(--bb-primary-500)"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M12 5v14" />
                    <path d="M5 12h14" />
                  </svg>
                  <span
                    style="
                      flex: 1;
                      font: 600 16px/1.45 var(--bb-font-sans);
                      color: var(--bb-text-primary);
                    "
                    >Custom duration</span
                  >
                  <span class="pro-pill">PRO</span>
                </button>

                <div style="flex: 1; min-height: 16px"></div>
              </div>

              <button class="btn btn-primary">Freeze it</button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Freeze sheet · choose duration</div>
    </div>
  </body>
</html>
