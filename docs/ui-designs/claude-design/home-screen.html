<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen">
            <div class="app-bar" style="justify-content: flex-end">
              <button class="icon-btn">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M6 8a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6" />
                  <path d="M10 19a2 2 0 0 0 4 0" />
                </svg>
                <span class="dot"></span>
              </button>
            </div>

            <div class="screen-body">
              <div>
                <div class="h-greeting">Good evening, Vojta</div>
                <div class="body-text" style="margin-top: 6px">What are you thinking about?</div>
              </div>
              <div class="sp-8"></div>

              <div class="card alt" style="padding: 20px">
                <div class="caption-up" style="margin-bottom: 10px">Saved in last 30 days</div>
                <div
                  style="
                    font: 700 32px/1.1 var(--bb-font-sans);
                    letter-spacing: -0.01em;
                    color: var(--bb-text-primary);
                  ">
                  €312.50
                </div>
              </div>
              <div class="sp-8"></div>

              <div
                style="
                  display: flex;
                  align-items: center;
                  height: 80px;
                  background: var(--bb-surface);
                  border: 1px solid var(--bb-border);
                  border-radius: 12px;
                  padding: 0 18px;
                  gap: 12px;
                ">
                <div
                  style="
                    flex: 1;
                    font: 800 36px/1.15 var(--bb-font-sans);
                    letter-spacing: -0.01em;
                    color: var(--bb-text-tertiary);
                  ">
                  €
                </div>
                <button
                  style="
                    display: inline-flex;
                    align-items: center;
                    gap: 4px;
                    height: 36px;
                    padding: 0 12px;
                    background: var(--bb-surface-alt);
                    border: 0;
                    border-radius: 20px;
                    font: 700 13px/1 var(--bb-font-sans);
                    color: var(--bb-text-primary);
                    cursor: pointer;
                    letter-spacing: 0.02em;
                  ">
                  EUR
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="var(--bb-text-secondary)"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6" />
                  </svg>
                </button>
              </div>
              <div class="sp-6"></div>

              <button class="btn btn-primary" disabled>See the cost</button>
            </div>

            <div class="tab-bar">
              <button class="tab">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <circle cx="12" cy="12" r="3" /></svg
                >Vault
              </button>
              <button class="tab active">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M3 11l9-8 9 8" />
                  <path d="M5 10v10h14V10" /></svg
                >Home
              </button>
              <button class="tab">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <circle cx="12" cy="8" r="4" />
                  <path d="M4 21c1-4 5-6 8-6s7 2 8 6" /></svg
                >Profile
              </button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Home · authenticated entry</div>
    </div>
  </body>
</html>
