<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Landing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen" style="padding-top: 88px; padding-bottom: 24px">
            <div
              style="display: flex; align-items: center; justify-content: center; padding: 0 16px">
              <img
                src="assets/landing-hero.svg"
                alt=""
                style="width: 100%; max-width: 360px; height: auto; display: block" />
            </div>
            <div class="sp-8"></div>
            <div style="padding: 0 20px; text-align: center">
              <h1
                style="
                  margin: 0;
                  font: 800 32px/1.15 var(--bb-font-sans);
                  letter-spacing: -0.015em;
                  color: var(--bb-text-primary);
                  text-wrap: balance;
                ">
                Pause before you buy.
              </h1>
              <div class="sp-3"></div>
              <p
                style="
                  margin: 0 auto;
                  font: 400 16px/1.5 var(--bb-font-sans);
                  color: var(--bb-text-secondary);
                  text-wrap: balance;
                  max-width: 320px;
                ">
                See the true cost of what you spend. Skip what doesn't matter.
              </p>
            </div>
            <div style="flex: 1; min-height: 24px"></div>
            <div style="padding: 0 20px; display: flex; flex-direction: column; gap: 12px">
              <button class="btn btn-primary">Create account</button>
              <button class="btn-ghost" style="border: 0; cursor: pointer">
                I already have an account
              </button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Landing · unauthenticated entry</div>
    </div>
  </body>
</html>
