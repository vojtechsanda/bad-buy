<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Log Out</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen" style="position: relative; overflow: hidden">
            <div style="height: 100%; background: var(--bb-bg); padding: 56px 20px 0">
              <div
                style="
                  font: 700 22px/1.2 var(--bb-font-sans);
                  color: var(--bb-text-primary);
                  letter-spacing: -0.01em;
                ">
                Profile
              </div>
              <div class="sp-6"></div>
              <div class="card" style="height: 92px; margin-bottom: 12px"></div>
              <div class="card alt" style="height: 64px; margin-bottom: 12px"></div>
              <div class="card bordered" style="height: 280px"></div>
            </div>

            <div class="sheet-backdrop"></div>
            <div class="sheet" style="height: 30%">
              <div class="handle"></div>

              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  text-align: center;
                ">
                <div
                  style="
                    font: 700 20px/1.3 var(--bb-font-sans);
                    letter-spacing: -0.005em;
                    color: var(--bb-text-primary);
                    margin-top: 4px;
                  ">
                  Log out?
                </div>
                <div class="sp-2"></div>
                <div
                  style="
                    font: 400 15px/1.5 var(--bb-font-sans);
                    color: var(--bb-text-secondary);
                    max-width: 320px;
                    text-wrap: balance;
                  ">
                  You'll need to log in again to use BadBuy.
                </div>
                <div class="grow"></div>
              </div>

              <button class="btn btn-primary" style="margin-top: 24px">Log out</button>
              <div class="sp-2"></div>
              <button
                class="btn-ghost"
                style="border: 0; cursor: pointer; width: 100%; height: 44px">
                Cancel
              </button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Log out · confirmation</div>
    </div>
  </body>
</html>
