<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen">
            <div style="display: flex; align-items: center; padding: 56px 12px 8px">
              <button
                style="
                  width: 40px;
                  height: 40px;
                  border-radius: 50%;
                  border: 0;
                  background: transparent;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  cursor: pointer;
                  color: var(--bb-text-primary);
                ">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M15 6l-6 6 6 6" />
                </svg>
              </button>
            </div>
            <div style="flex: 1; padding: 32px 20px 24px; display: flex; flex-direction: column">
              <h1 class="h-title-lg" style="margin: 0">Welcome back</h1>
              <div class="sp-8"></div>

              <div>
                <div class="field-label">Email</div>
                <div class="text-input"><input type="email" value="you@example.com" /></div>
              </div>

              <div class="sp-4"></div>

              <div>
                <div class="field-label">Password</div>
                <div class="text-input">
                  <input type="text" value="••••••••••" style="letter-spacing: 0.12em" />
                  <button class="trailing-btn">
                    <svg
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>

              <div class="sp-8"></div>
              <button class="btn btn-primary">Log in</button>
              <div class="sp-4"></div>

              <div
                style="
                  text-align: center;
                  font: 400 15px/1.5 var(--bb-font-sans);
                  color: var(--bb-text-secondary);
                ">
                Don't have an account?
                <a
                  style="
                    color: var(--bb-primary-500);
                    text-decoration: underline;
                    font-weight: 600;
                    cursor: pointer;
                  "
                  >Sign up</a
                >
              </div>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Login · returning user</div>
    </div>
  </body>
</html>
