<!doctype html>

                  color: var(--bb-text-primary);

              </div>

                    width: 100%;
                    border: 0;
                    background: transparent;
                    outline: 0;
                    text-align: center;
                    text-transform: uppercase;
                    font-family: var(--bb-font-mono);
                    font-size: 22px;
                    font-weight: 700;
                    line-height: 1;
                    letter-spacing: 0.18em;

                    font: 400 15px/1 var(--bb-font-sans);
