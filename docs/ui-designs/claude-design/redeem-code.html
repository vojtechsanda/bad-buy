<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Redeem Code</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen" style="position: relative; overflow: hidden">
            <div style="height: 100%; background: var(--bb-bg); padding: 56px 20px 0">
              <div
                style="
                  font: 700 22px/1.2 var(--bb-font-sans);
                  color: var(--bb-text-primary);
                  letter-spacing: -0.01em;
                "
              >
                Profile
              </div>
              <div class="sp-6"></div>
              <div class="card" style="height: 92px; margin-bottom: 12px"></div>
              <div class="card alt" style="height: 64px; margin-bottom: 12px"></div>
              <div class="card bordered" style="height: 200px"></div>
            </div>

            <div class="sheet-backdrop"></div>
            <div class="sheet" style="height: 50%">
              <div class="handle"></div>

              <div style="flex: 1; display: flex; flex-direction: column">
                <div
                  style="
                    font: 700 20px/1.3 var(--bb-font-sans);
                    letter-spacing: -0.005em;
                    color: var(--bb-text-primary);
                  "
                >
                  Redeem a code
                </div>
                <div class="sp-2"></div>
                <div
                  style="
                    font: 400 15px/1.5 var(--bb-font-sans);
                    color: var(--bb-text-secondary);
                    text-wrap: balance;
                  "
                >
                  Enter a referral or promo code to unlock 3 months of Premium.
                </div>

                <div class="sp-6"></div>

                <div
                  style="
                    height: 56px;
                    background: var(--bb-surface);
                    border: 1px solid var(--bb-border);
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 0 16px;
                  "
                >
                  <input
                    value="K7M2QP"
                    style="
                      width: 100%;
                      border: 0;
                      outline: 0;
                      background: transparent;
                      font-family: var(--bb-font-mono);
                      font-size: 18px;
                      font-weight: 700;
                      line-height: 1;
                      color: var(--bb-text-primary);
                      text-align: center;
                      text-transform: uppercase;
                      letter-spacing: 0.18em;
                    "
                  />
                </div>

                <div class="sp-2"></div>
                <div class="grow"></div>
              </div>

              <button class="btn btn-primary" style="margin-top: 12px">Redeem</button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Redeem code · profile entry</div>
    </div>
  </body>
</html>
