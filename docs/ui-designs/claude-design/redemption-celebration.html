<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BadBuy — Redemption Celebration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="stage-bg">
    <a class="back-to-index" href="index.html" title="Back to all screens"
      ><svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M15 6l-6 6 6 6" /></svg
      >All screens</a
    >
    <div class="stage">
      <div class="ios-device">
        <div class="ios-island"></div>
        <div class="ios-status-bar">
          <div class="time">9:41</div>
          <div class="icons"></div>
        </div>
        <div class="ios-content">
          <div class="screen" style="position: relative; overflow: hidden">
            <div style="height: 100%; background: var(--bb-bg); padding: 56px 20px 0">
              <div
                style="
                  font: 700 22px/1.2 var(--bb-font-sans);
                  color: var(--bb-text-primary);
                  letter-spacing: -0.01em;
                ">
                Profile
              </div>
              <div class="sp-6"></div>
              <div class="card" style="height: 92px; margin-bottom: 12px"></div>
              <div class="card alt" style="height: 64px; margin-bottom: 12px"></div>
              <div class="card bordered" style="height: 200px"></div>
            </div>

            <div class="sheet-backdrop"></div>
            <div class="sheet" style="height: 40%">
              <div class="handle" style="margin: 0 auto 8px"></div>

              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  text-align: center;
                ">
                <div style="margin-top: 4px; margin-bottom: 16px">
                  <svg
                    width="64"
                    height="64"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#F9C846"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" />
                    <path d="M19 14l1 2.5L22.5 17.5 20 18.5 19 21l-1-2.5L15.5 17.5 18 16.5z" />
                    <path d="M5 4l.7 1.6L7.5 6.5 5.7 7.4 5 9l-.7-1.6L2.5 6.5 4.3 5.6z" />
                  </svg>
                </div>

                <div
                  style="
                    font: 700 22px/1.35 var(--bb-font-sans);
                    letter-spacing: -0.005em;
                    color: var(--bb-text-primary);
                  ">
                  🎉 Premium unlocked
                </div>
                <div class="sp-2"></div>
                <div style="font: 600 16px/1.5 var(--bb-font-sans); color: var(--bb-text-primary)">
                  3 months of Premium added to your account.
                </div>
                <div style="height: 4px"></div>
                <div
                  style="font: 400 15px/1.45 var(--bb-font-sans); color: var(--bb-text-secondary)">
                  You now have 90 days of Premium.
                </div>
                <div class="grow"></div>
              </div>

              <button class="btn btn-primary" style="margin-top: 12px">Awesome</button>
            </div>
          </div>
        </div>
        <div class="ios-home-indicator"><div class="bar"></div></div>
      </div>
      <div class="stage-label">Redemption celebration · 3 months unlocked</div>
    </div>
  </body>
</html>
