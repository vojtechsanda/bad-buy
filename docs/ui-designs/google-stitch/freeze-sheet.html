      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;

        -webkit-tap-highlight-color: transparent;

    <!-- Top App Bar -->

      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-[#3E8F7C] dark:text-[#4fac96]" data-icon="spa"

        >
        <h1 class="font-manrope text-lg font-semibold text-[#3E8F7C] dark:text-[#4fac96]">
          Mindful Spending
        </h1>
      </div>
      <div class="flex items-center gap-4">
        <button class="transition-opacity hover:opacity-80">
          <span class="material-symbols-outlined text-stone-500" data-icon="notifications"
            >notifications</span
          >
        </button>
        <div class="bg-primary-fixed h-8 w-8 overflow-hidden rounded-full">
          <img
            alt="User Profile"
            data-alt="A clean and professional close-up portrait of a serene person, set against a soft, warm-toned studio background. The lighting is gentle and diffused, highlighting the calm expression. The overall aesthetic is minimalist and organic, fitting the mindful financial wellness theme with soft neutral colors."

        </div>
      </div>
    </header>
    <!-- Main Content Canvas (Blurred behind overlay) -->
    <main class="px-container-margin space-y-xl pt-20 opacity-40">
      <section class="bg-surface-container-lowest p-md rounded-xl border border-stone-100">
        <div class="mb-md flex items-center justify-between">
          <h2 class="font-headline-md text-headline-md text-primary">Monthly Overview</h2>
          <span class="material-symbols-outlined text-outline" data-icon="more_horiz"
            >more_horiz</span
          >
        </div>
        <div class="gap-sm flex flex-col">
          <div class="bg-surface-container h-4 w-full rounded-full">
            <div class="bg-secondary-container h-full w-3/4 rounded-full"></div>
          </div>
          <p class="text-label-caps font-label-caps text-outline uppercase tracking-wider">
            75% OF BUDGET REMAINING
          </p>
        </div>
      </section>
      <section class="gap-md grid grid-cols-2">
        <div
          class="bg-surface-container-lowest p-md flex aspect-square flex-col justify-between rounded-xl border border-stone-100">
          <span class="material-symbols-outlined text-primary text-3xl" data-icon="savings"
            >savings</span
          >
          <div>
            <p class="text-label-caps font-label-caps text-outline">SAVED THIS MONTH</p>
            <p class="text-headline-md font-headline-md">$420.00</p>
          </div>
        </div>
        <div
          class="bg-surface-container-lowest p-md flex aspect-square flex-col justify-between rounded-xl border border-stone-100">
          <span class="material-symbols-outlined text-secondary text-3xl" data-icon="timer"
            >timer</span
          >
          <div>
            <p class="text-label-caps font-label-caps text-outline">ACTIVE FREEZES</p>
            <p class="text-headline-md font-headline-md">3 Items</p>
          </div>
        </div>
      </section>
    </main>
    <!-- Backdrop Overlay -->
    <div class="fixed inset-0 z-[45] bg-[#2C2A26]/40 backdrop-blur-[1px]"></div>
    <!-- Bottom Sheet Overlay -->
    <div
      class="animate-slide-up fixed bottom-0 left-0 right-0 z-[50] flex h-[618px] flex-col rounded-t-[20px] bg-white shadow-[0_-8px_24px_rgba(0,0,0,0.08)]">
      <!-- Drag Handle -->
      <div class="flex justify-center pb-2 pt-3">
        <div class="h-[4px] w-[36px] rounded-full bg-[#E8E2D6]"></div>
      </div>
      <div class="px-container-margin py-sm flex-1 overflow-y-auto pb-32">
        <!-- Header Title -->
        <h2 class="font-headline-md mb-lg text-center text-[18px] font-bold text-[#2C2A26]">
          Freeze this decision
        </h2>
        <div class="space-y-xl">
          <!-- Name Input Field -->
          <div class="space-y-sm">
            <label
              class="font-label-caps text-label-caps text-outline block uppercase tracking-widest"
              >Name it</label
            >
            <div class="relative">
              <input
                class="px-md font-body-lg text-on-surface focus:border-primary-container w-full rounded-xl border border-[#E8E2D6] bg-white py-4 transition-colors focus:outline-none"
                type="text"
                value="Wireless headphones" />
            </div>
          </div>
          <!-- Duration Section -->
          <div class="space-y-md">
            <p class="font-body-lg text-body-lg text-[#2C2A26]">Decide in…</p>
            <!-- Chips Wrapping Layout -->
            <div class="gap-sm flex flex-wrap">
              <button
                class="px-lg bg-surface-container-lowest text-on-surface-variant rounded-full border border-stone-100 py-2.5 font-medium transition-colors hover:bg-stone-50">
                30 minutes
              </button>
              <button
                class="px-lg bg-surface-container-lowest text-on-secondary-fixed-variant rounded-full border border-stone-100 py-2.5 font-medium transition-colors hover:bg-stone-50">
                6 hours
              </button>
              <!-- Selected Chip -->
              <button
                class="px-lg scale-105 transform rounded-full bg-[#3E8F7C] py-2.5 font-bold text-white transition-all">
                1 day
              </button>
              <button
                class="px-lg bg-surface-container-lowest text-on-surface-variant rounded-full border border-stone-100 py-2.5 font-medium transition-colors hover:bg-stone-50">
                1 week
              </button>
            </div>
          </div>
          <!-- Custom Duration Row -->
          <button
            class="p-md group flex w-full items-center justify-between rounded-xl bg-[#F4F1EB] transition-colors hover:bg-[#ece8df]">
            <div class="gap-sm flex items-center">
              <span class="material-symbols-outlined text-[#3E8F7C]" data-icon="add_circle"
                >add_circle</span
              >
              <span class="font-body-md text-on-surface font-semibold">Custom duration</span>
            </div>
            <div class="gap-sm flex items-center">
              <span
                class="rounded-full bg-[#E89B7A] px-2 py-0.5 text-[10px] font-bold uppercase tracking-tighter text-white"

              <span
                class="material-symbols-outlined text-stone-400 transition-transform group-hover:translate-x-1"
                data-icon="chevron_right"
                >chevron_right</span
              >
            </div>
          </button>

            <div
              class="bg-primary-fixed/30 relative flex h-24 w-24 items-center justify-center rounded-full">
              <span
                class="material-symbols-outlined text-primary text-5xl opacity-40"
                data-icon="ac_unit"
                >ac_unit</span
              >
              <div
                class="border-primary/20 absolute inset-0 animate-[spin_10s_linear_infinite] rounded-full border-2 border-dashed"></div>
            </div>
          </div>

        <button

        </button>

      <a

          data-icon="ac_unit"
          data-weight="fill"
