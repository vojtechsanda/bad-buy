<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hobbies</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'tertiary-fixed-dim': '#ffb4a6',
              'surface-container-low': '#f1f4f1',
              'surface-tint': '#0c6b59',
              'surface-variant': '#e0e3e0',
              'surface-dim': '#d7dbd8',
              'secondary-fixed': '#ffdbcd',
              'primary-fixed': '#a1f2dc',
              'on-error': '#ffffff',
              tertiary: '#8d483c',
              secondary: '#8c4e33',
              'inverse-surface': '#2d3130',
              'on-secondary-fixed': '#360f00',
              'surface-container-lowest': '#ffffff',
              surface: '#f7faf7',
              'on-background': '#181c1b',
              'tertiary-fixed': '#ffdad4',
              'surface-bright': '#f7faf7',
              'surface-container': '#ebefec',
              background: '#f7faf7',
              'secondary-fixed-dim': '#ffb596',
              'on-primary': '#ffffff',
              'primary-container': '#2f826f',
              'on-tertiary-container': '#fffbff',
              'on-surface-variant': '#3f4945',
              'surface-container-highest': '#e0e3e0',
              'on-tertiary-fixed-variant': '#733429',
              'on-tertiary-fixed': '#3a0a04',
              'on-secondary-fixed-variant': '#6f371e',
              'on-primary-fixed-variant': '#005143',
              'surface-container-high': '#e6e9e6',
              'tertiary-container': '#aa6053',
              'inverse-primary': '#86d6c0',
              'on-primary-container': '#f4fffa',
              primary: '#056857',
              error: '#ba1a1a',
              'secondary-container': '#feae8c',
              'on-primary-fixed': '#00201a',
              'outline-variant': '#bec9c4',
              'on-tertiary': '#ffffff',
              'on-secondary': '#ffffff',
              'primary-fixed-dim': '#86d6c0',
              'inverse-on-surface': '#eef2ee',
              'on-error-container': '#93000a',
              'error-container': '#ffdad6',
              'on-surface': '#181c1b',
              'on-secondary-container': '#793f25',
              outline: '#6f7975',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              xl: '48px',
              lg: '24px',
              xs: '4px',
              md: '16px',
              sm: '8px',
            },
            fontFamily: {
              'display-lg': ['Manrope'],
              caption: ['Manrope'],
              'display-md': ['Manrope'],
              body: ['Manrope'],
              'body-sm': ['Manrope'],
            },
            fontSize: {
              'display-lg': [
                '28px',
                {
                  lineHeight: '36px',
                  fontWeight: '800',
                },
              ],
              caption: [
                '11px',
                {
                  lineHeight: '16px',
                  letterSpacing: '0.08em',
                  fontWeight: '600',
                },
              ],
              'display-md': [
                '22px',
                {
                  lineHeight: '30px',
                  fontWeight: '700',
                },
              ],
              body: [
                '15px',
                {
                  lineHeight: '22px',
                  fontWeight: '400',
                },
              ],
              'body-sm': [
                '13px',
                {
                  lineHeight: '20px',
                  fontWeight: '400',
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #fbf9f5;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="font-body text-on-surface min-h-screen pb-24 pt-16 text-body antialiased md:pb-0">
    <!-- TopAppBar -->
    <header
      class="fixed top-0 z-50 w-full border-b border-[#E8E2D6] bg-white dark:border-stone-800 dark:bg-stone-900">
      <div class="flex h-16 w-full items-center justify-between px-4">
        <button
          class="flex items-center justify-center rounded-full p-2 transition-colors duration-150 hover:bg-stone-50 active:scale-95 dark:hover:bg-stone-800">
          <span class="material-symbols-outlined text-[#3E8F7C]">arrow_back</span>
        </button>
        <h1
          class="font-manrope text-lg font-bold text-[#3E8F7C] text-stone-800 antialiased dark:text-stone-100">
          Hobbies
        </h1>
        <div class="w-10"></div>
        <!-- Placeholder for balance -->
      </div>
    </header>
    <!-- Main Canvas -->
    <main class="px-md md:px-lg pt-lg mx-auto max-w-[1200px]">
      <div class="mb-md flex justify-end">
        <span class="font-caption text-outline text-caption">5 selected</span>
      </div>
      <div class="mb-lg flex flex-wrap gap-[8px]">
        <!-- Sports -->
        <button
          class="gap-xs flex items-center rounded-[20px] border border-[#3E8F7C] bg-[#3E8F7C] px-[14px] py-[8px] text-white">
          <span class="material-symbols-outlined text-[16px]">directions_bike</span>
          <span class="font-body-sm text-body-sm">Cycling</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">directions_run</span>
          <span class="font-body-sm text-body-sm">Running</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">self_improvement</span>
          <span class="font-body-sm text-body-sm">Yoga</span>
        </button>
        <button
          class="gap-xs flex items-center rounded-[20px] border border-[#3E8F7C] bg-[#3E8F7C] px-[14px] py-[8px] text-white">
          <span class="material-symbols-outlined text-[16px]">hiking</span>
          <span class="font-body-sm text-body-sm">Hiking</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">sports_martial_arts</span>
          <span class="font-body-sm text-body-sm">Climbing</span>
        </button>
        <!-- Music -->
        <button
          class="gap-xs flex items-center rounded-[20px] border border-[#3E8F7C] bg-[#3E8F7C] px-[14px] py-[8px] text-white">
          <span class="material-symbols-outlined text-[16px]">music_note</span>
          <span class="font-body-sm text-body-sm">Guitar</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">piano</span>
          <span class="font-body-sm text-body-sm">Piano</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">mic</span>
          <span class="font-body-sm text-body-sm">Singing</span>
        </button>
        <!-- Food -->
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">restaurant</span>
          <span class="font-body-sm text-body-sm">Cooking</span>
        </button>
        <button
          class="gap-xs flex items-center rounded-[20px] border border-[#3E8F7C] bg-[#3E8F7C] px-[14px] py-[8px] text-white">
          <span class="material-symbols-outlined text-[16px]">local_cafe</span>
          <span class="font-body-sm text-body-sm">Coffee</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">wine_bar</span>
          <span class="font-body-sm text-body-sm">Wine</span>
        </button>
        <!-- Creative -->
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">photo_camera</span>
          <span class="font-body-sm text-body-sm">Photography</span>
        </button>
        <button
          class="gap-xs flex items-center rounded-[20px] border border-[#3E8F7C] bg-[#3E8F7C] px-[14px] py-[8px] text-white">
          <span class="material-symbols-outlined text-[16px]">palette</span>
          <span class="font-body-sm text-body-sm">Painting</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">menu_book</span>
          <span class="font-body-sm text-body-sm">Reading</span>
        </button>
        <!-- Tech -->
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">sports_esports</span>
          <span class="font-body-sm text-body-sm">Gaming</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">code</span>
          <span class="font-body-sm text-body-sm">Coding</span>
        </button>
        <!-- Outdoors -->
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">flight</span>
          <span class="font-body-sm text-body-sm">Travel</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">camping</span>
          <span class="font-body-sm text-body-sm">Camping</span>
        </button>
        <button
          class="gap-xs text-on-surface border-outline-variant flex items-center rounded-[20px] border bg-white px-[14px] py-[8px]">
          <span class="material-symbols-outlined text-[16px]">yard</span>
          <span class="font-body-sm text-body-sm">Gardening</span>
        </button>
      </div>
      <!-- Add Custom Hobby -->
      <div
        class="p-md hover:bg-surface-variant border-outline-variant flex cursor-pointer items-center justify-between rounded-xl border bg-[#F4F1EB] transition-colors">
        <div class="gap-md flex items-center">
          <div
            class="border-outline-variant flex items-center justify-center rounded-full border bg-white p-2">
            <span class="material-symbols-outlined text-[#3E8F7C]">add</span>
          </div>
          <span class="font-body text-on-surface text-body font-medium">Add custom hobby</span>
        </div>
        <div
          class="font-caption rounded-full bg-[#E89B7A] px-3 py-1 text-caption uppercase text-white">
          PRO
        </div>
      </div>
    </main>
    <!-- BottomNavBar -->
    <nav
      class="pb-safe fixed bottom-0 left-0 z-50 flex h-20 w-full items-center justify-around rounded-t-lg border-t border-[#E8E2D6] bg-white px-6 dark:border-stone-800 dark:bg-stone-900 md:hidden">
      <a
        class="tap-highlight-transparent flex flex-col items-center justify-center text-stone-400 transition-all hover:text-[#3E8F7C] dark:text-stone-600"
        href="#">
        <span class="material-symbols-outlined mb-1">home</span>
        <span class="font-manrope text-[11px] font-medium">Home</span>
      </a>
      <a
        class="tap-highlight-transparent flex flex-col items-center justify-center text-stone-400 transition-all hover:text-[#3E8F7C] dark:text-stone-600"
        href="#">
        <span class="material-symbols-outlined mb-1">account_balance_wallet</span>
        <span class="font-manrope text-[11px] font-medium">Spending</span>
      </a>
      <a
        class="tap-highlight-transparent flex flex-col items-center justify-center text-stone-400 transition-all hover:text-[#3E8F7C] dark:text-stone-600"
        href="#">
        <span class="material-symbols-outlined mb-1">self_improvement</span>
        <span class="font-manrope text-[11px] font-medium">Wellness</span>
      </a>
      <a
        class="tap-highlight-transparent flex flex-col items-center justify-center font-bold text-[#3E8F7C] dark:text-[#3E8F7C]"
        href="#">
        <span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1"
          >person</span
        >
        <span class="font-manrope text-[11px] font-medium">Profile</span>
      </a>
    </nav>
  </body>
</html>
