<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Financial Wellness - Home</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-container-high': '#e6e9e6',
              surface: '#f7faf7',
              'on-error-container': '#93000a',
              'on-secondary': '#ffffff',
              'on-secondary-fixed': '#360f00',
              'inverse-surface': '#2d3130',
              'on-tertiary': '#ffffff',
              'on-primary-container': '#f4fffa',
              'primary-fixed-dim': '#86d6c0',
              'inverse-primary': '#86d6c0',
              'on-secondary-fixed-variant': '#6f371e',
              'surface-dim': '#d7dbd8',
              outline: '#6f7975',
              'surface-container-lowest': '#ffffff',
              'on-secondary-container': '#793f25',
              'on-primary-fixed-variant': '#005143',
              'surface-tint': '#0c6b59',
              'on-tertiary-fixed': '#3a0a04',
              'error-container': '#ffdad6',
              'surface-bright': '#f7faf7',
              'primary-container': '#2f826f',
              secondary: '#8c4e33',
              'on-surface-variant': '#3f4945',
              'inverse-on-surface': '#eef2ee',
              'on-primary': '#ffffff',
              'tertiary-fixed-dim': '#ffb4a6',
              'surface-variant': '#e0e3e0',
              'on-tertiary-container': '#fffbff',
              'surface-container-low': '#f1f4f1',
              'tertiary-fixed': '#ffdad4',
              'secondary-fixed-dim': '#ffb596',
              'on-surface': '#181c1b',
              error: '#ba1a1a',
              'secondary-fixed': '#ffdbcd',
              'outline-variant': '#bec9c4',
              'on-primary-fixed': '#00201a',
              'on-tertiary-fixed-variant': '#733429',
              'surface-container': '#ebefec',
              'tertiary-container': '#aa6053',
              primary: '#056857',
              'secondary-container': '#feae8c',
              'on-error': '#ffffff',
              'primary-fixed': '#a1f2dc',
              'on-background': '#181c1b',
              'surface-container-highest': '#e0e3e0',
              tertiary: '#8d483c',
              background: '#f7faf7',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              lg: '24px',
              md: '16px',
              sm: '8px',
              xs: '4px',
              xl: '48px',
            },
            fontFamily: {
              'body-sm': ['Manrope'],
              'display-lg': ['Manrope'],
              'display-md': ['Manrope'],
              body: ['Manrope'],
              caption: ['Manrope'],
            },
            fontSize: {
              'body-sm': [
                '13px',
                {
                  lineHeight: '20px',
                  fontWeight: '400',
                },
              ],
              'display-lg': [
                '28px',
                {
                  lineHeight: '36px',
                  fontWeight: '800',
                },
              ],
              'display-md': [
                '22px',
                {
                  lineHeight: '30px',
                  fontWeight: '700',
                },
              ],
              body: [
                '15px',
                {
                  lineHeight: '22px',
                  fontWeight: '400',
                },
              ],
              caption: [
                '11px',
                {
                  lineHeight: '16px',
                  letterSpacing: '0.08em',
                  fontWeight: '600',
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #f7faf7;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background text-on-background flex min-h-screen flex-col items-center">
    <div
      class="bg-background relative flex h-[844px] w-full max-w-[390px] flex-col overflow-hidden shadow-xl">
      <!-- TopAppBar -->
      <header
        class="bg-surface-container-lowest z-10 flex h-16 w-full shrink-0 items-center justify-between border-none px-4 shadow-none dark:bg-stone-900">
        <div class="flex items-center">
          <!-- Empty leading space to match spec -->
          <div class="h-8 w-8"></div>
        </div>
        <div
          class="text-primary font-display-md text-display-md text-xl font-bold dark:text-teal-400">
          Financial Wellness
        </div>
        <div
          class="text-primary relative flex h-10 w-10 cursor-pointer items-center justify-center rounded-full transition-colors duration-200 hover:bg-stone-50 active:scale-95 dark:text-teal-400 dark:hover:bg-stone-800">
          <span
            class="material-symbols-outlined"
            data-icon="notifications"
            style="font-variation-settings: 'FILL' 0"
            >notifications</span
          >
          <span
            class="bg-secondary-container border-surface-container-lowest absolute right-2 top-2 h-2 w-2 rounded-full border"></span>
        </div>
      </header>
      <!-- Main Content Canvas -->
      <main class="pt-md gap-lg flex flex-1 flex-col overflow-y-auto px-[20px] pb-24">
        <!-- Greeting Block -->
        <section class="gap-xs flex flex-col">
          <h1 class="font-display-md text-on-surface text-display-md">Good evening, Vojta</h1>
          <p class="font-body text-on-surface-variant text-body">What are you thinking about?</p>
        </section>
        <!-- Saved Amount Block -->
        <section
          class="bg-surface-container gap-sm border-outline-variant flex flex-col rounded-xl border p-[20px]">
          <h2 class="font-caption text-on-surface-variant text-caption uppercase">
            SAVED IN LAST 30 DAYS
          </h2>
          <div class="font-display-lg text-on-surface text-display-lg">€312.50</div>
        </section>
        <!-- Price Input Component -->
        <section
          class="bg-surface-container-lowest border-outline-variant px-md focus-within:border-primary flex h-[80px] items-center justify-between rounded-xl border shadow-sm transition-colors">
          <div class="flex h-full flex-1 items-center">
            <span class="font-display-lg text-outline-variant mr-2 text-display-lg">€</span>
            <input
              class="font-display-lg text-on-surface placeholder-outline-variant h-full w-full border-none bg-transparent text-display-lg outline-none focus:ring-0"
              placeholder="0.00"
              type="text" />
          </div>
          <div
            class="bg-surface-container hover:bg-surface-variant flex h-[36px] cursor-pointer items-center gap-1 rounded-full px-3 transition-colors">
            <span class="font-body-sm text-on-surface text-body-sm">EUR</span>
            <span class="material-symbols-outlined text-on-surface-variant text-[18px]"
              >expand_more</span
            >
          </div>
        </section>
        <!-- Primary CTA -->
        <section class="mt-auto pb-4">
          <button
            class="bg-primary text-on-primary font-body flex h-[56px] w-full cursor-not-allowed items-center justify-center rounded-xl text-body font-semibold opacity-50 transition-opacity"
            disabled="">
            See the cost
          </button>
        </section>
      </main>
      <!-- BottomNavBar -->
      <nav
        class="fixed bottom-0 left-0 left-1/2 z-50 mx-auto flex w-full max-w-[390px] -translate-x-1/2 items-center justify-around border-t border-stone-200 bg-white px-4 py-3 shadow-[0_-4px_20px_rgba(0,0,0,0.02)] dark:border-stone-800 dark:bg-stone-900">
        <!-- Vault (Inactive) -->
        <button
          class="flex w-16 flex-col items-center justify-center gap-1 text-stone-400 transition-colors duration-150 hover:text-teal-500 active:scale-90 dark:text-stone-500">
          <span
            class="material-symbols-outlined text-[24px]"
            data-icon="account_balance"
            style="font-variation-settings: 'FILL' 0"
            >account_balance</span
          >
          <span class="font-manrope text-[10px] font-medium uppercase tracking-wide">Vault</span>
        </button>
        <!-- Home (Active) -->
        <button
          class="flex w-16 flex-col items-center justify-center gap-1 font-bold text-teal-600 transition-colors duration-150 hover:text-teal-500 active:scale-90 dark:text-teal-400">
          <span
            class="material-symbols-outlined text-[24px]"
            data-icon="home"
            style="font-variation-settings: 'FILL' 1"
            >home</span
          >
          <span class="font-manrope text-[10px] font-medium uppercase tracking-wide">Home</span>
        </button>
        <!-- Profile (Inactive) -->
        <button
          class="flex w-16 flex-col items-center justify-center gap-1 text-stone-400 transition-colors duration-150 hover:text-teal-500 active:scale-90 dark:text-stone-500">
          <span
            class="material-symbols-outlined text-[24px]"
            data-icon="person"
            style="font-variation-settings: 'FILL' 0"
            >person</span
          >
          <span class="font-manrope text-[10px] font-medium uppercase tracking-wide">Profile</span>
        </button>
      </nav>
    </div>
  </body>
</html>
