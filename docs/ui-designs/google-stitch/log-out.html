<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Logout Confirmation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-secondary-fixed': '#360f00',
              'inverse-surface': '#2d3130',
              tertiary: '#8d483c',
              secondary: '#8c4e33',
              'on-error': '#ffffff',
              'surface-dim': '#d7dbd8',
              'secondary-fixed': '#ffdbcd',
              'primary-fixed': '#a1f2dc',
              'surface-tint': '#0c6b59',
              'surface-variant': '#e0e3e0',
              'surface-container-low': '#f1f4f1',
              'tertiary-fixed-dim': '#ffb4a6',
              'surface-container-high': '#e6e9e6',
              'surface-container-highest': '#e0e3e0',
              'on-tertiary-fixed-variant': '#733429',
              'on-tertiary-fixed': '#3a0a04',
              'on-secondary-fixed-variant': '#6f371e',
              'on-primary-fixed-variant': '#005143',
              'primary-container': '#2f826f',
              'on-tertiary-container': '#fffbff',
              'on-surface-variant': '#3f4945',
              'on-primary': '#ffffff',
              'secondary-fixed-dim': '#ffb596',
              'surface-bright': '#f7faf7',
              'surface-container': '#ebefec',
              background: '#f7faf7',
              'tertiary-fixed': '#ffdad4',
              'surface-container-lowest': '#ffffff',
              surface: '#f7faf7',
              'on-background': '#181c1b',
              'secondary-container': '#feae8c',
              primary: '#056857',
              error: '#ba1a1a',
              'on-primary-container': '#f4fffa',
              'inverse-primary': '#86d6c0',
              'tertiary-container': '#aa6053',
              outline: '#6f7975',
              'on-surface': '#181c1b',
              'on-secondary-container': '#793f25',
              'inverse-on-surface': '#eef2ee',
              'on-error-container': '#93000a',
              'error-container': '#ffdad6',
              'primary-fixed-dim': '#86d6c0',
              'on-secondary': '#ffffff',
              'on-tertiary': '#ffffff',
              'on-primary-fixed': '#00201a',
              'outline-variant': '#bec9c4',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              xl: '48px',
              xs: '4px',
              md: '16px',
              lg: '24px',
              sm: '8px',
            },
            fontFamily: {
              'display-md': ['Manrope'],
              body: ['Manrope'],
              'body-sm': ['Manrope'],
              caption: ['Manrope'],
              'display-lg': ['Manrope'],
            },
            fontSize: {
              'display-md': ['22px', { lineHeight: '30px', fontWeight: '700' }],
              body: ['15px', { lineHeight: '22px', fontWeight: '400' }],
              'body-sm': ['13px', { lineHeight: '20px', fontWeight: '400' }],
              caption: ['11px', { lineHeight: '16px', letterSpacing: '0.08em', fontWeight: '600' }],
              'display-lg': ['28px', { lineHeight: '36px', fontWeight: '800' }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background font-body text-on-background flex h-screen w-screen flex-col justify-end overflow-hidden"
  >
    <!-- Backdrop -->
    <div class="fixed inset-0 z-40 bg-[#2C2A26]/40 transition-opacity"></div>
    <!-- Bottom Sheet -->
    <div
      class="bg-surface-container-lowest relative z-50 flex w-full flex-col items-center rounded-t-[20px] px-[20px] pb-[24px] pt-[20px] shadow-[0_-8px_24px_rgba(44,42,38,0.10)]"
    >
      <!-- Drag Handle -->
      <div class="bg-surface-variant mb-[8px] h-[4px] w-[36px] rounded-full"></div>
      <!-- Content -->
      <div class="mt-[8px] flex w-full flex-col items-center text-center">
        <h2 class="font-display-md text-on-background text-display-md">Log out?</h2>
        <p class="font-body text-on-surface-variant mt-sm text-body">
          You'll need to log in again to use BadBuy.
        </p>
        <div class="gap-sm mt-lg flex w-full flex-col">
          <button
            class="bg-primary text-on-primary font-body flex h-[52px] w-full items-center justify-center rounded-[12px] text-body font-bold transition-transform active:scale-95"
          >
            Log out
          </button>
          <button
            class="text-primary font-body hover:bg-surface-container-low active:bg-surface-container flex h-[44px] w-full items-center justify-center rounded-[12px] bg-transparent text-body font-bold transition-colors"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
