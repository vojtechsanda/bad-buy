<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notifications</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-surface-variant': '#3f4945',
              'on-tertiary-fixed': '#3a0a04',
              'surface-container-highest': '#e0e3e0',
              secondary: '#8c4e33',
              'surface-container-lowest': '#ffffff',
              'on-tertiary-container': '#fffbff',
              'on-secondary-container': '#793f25',
              'tertiary-container': '#aa6053',
              tertiary: '#8d483c',
              'primary-fixed': '#a1f2dc',
              'surface-container-high': '#e6e9e6',
              'inverse-on-surface': '#eef2ee',
              'on-primary': '#ffffff',
              'surface-tint': '#0c6b59',
              'surface-dim': '#d7dbd8',
              'error-container': '#ffdad6',
              'surface-variant': '#e0e3e0',
              'secondary-container': '#feae8c',
              'on-secondary-fixed-variant': '#6f371e',
              'primary-container': '#2f826f',
              'secondary-fixed-dim': '#ffb596',
              'on-error': '#ffffff',
              'outline-variant': '#bec9c4',
              surface: '#f7faf7',
              error: '#ba1a1a',
              background: '#f7faf7',
              outline: '#6f7975',
              'inverse-surface': '#2d3130',
              'on-background': '#181c1b',
              'on-tertiary-fixed-variant': '#733429',
              'on-primary-fixed-variant': '#005143',
              'on-error-container': '#93000a',
              'tertiary-fixed-dim': '#ffb4a6',
              'on-tertiary': '#ffffff',
              'surface-container-low': '#f1f4f1',
              'on-surface': '#181c1b',
              'on-primary-container': '#f4fffa',
              'tertiary-fixed': '#ffdad4',
              'surface-container': '#ebefec',
              primary: '#056857',
              'secondary-fixed': '#ffdbcd',
              'on-primary-fixed': '#00201a',
              'inverse-primary': '#86d6c0',
              'primary-fixed-dim': '#86d6c0',
              'surface-bright': '#f7faf7',
              'on-secondary': '#ffffff',
              'on-secondary-fixed': '#360f00',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              xl: '48px',
              md: '16px',
              xs: '4px',
              sm: '8px',
              lg: '24px',
            },
            fontFamily: {
              caption: ['Manrope'],
              'display-lg': ['Manrope'],
              'body-sm': ['Manrope'],
              'display-md': ['Manrope'],
              body: ['Manrope'],
            },
            fontSize: {
              caption: [
                '11px',
                {
                  lineHeight: '16px',
                  letterSpacing: '0.08em',
                  fontWeight: '600',
                },
              ],
              'display-lg': [
                '28px',
                {
                  lineHeight: '36px',
                  fontWeight: '800',
                },
              ],
              'body-sm': [
                '13px',
                {
                  lineHeight: '20px',
                  fontWeight: '400',
                },
              ],
              'display-md': [
                '22px',
                {
                  lineHeight: '30px',
                  fontWeight: '700',
                },
              ],
              body: [
                '15px',
                {
                  lineHeight: '22px',
                  fontWeight: '400',
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background font-body text-on-background selection:bg-primary selection:text-on-primary flex h-screen w-full items-center justify-center antialiased"
  >
    <!-- Mobile Device Container -->
    <div
      class="bg-surface sm:border-surface-container-highest relative flex h-full max-h-[850px] w-full max-w-[400px] flex-col overflow-hidden shadow-2xl sm:rounded-[40px] sm:border-8"
    >
      <!-- Background App Content (Simulated) -->
      <div class="p-md gap-md flex flex-1 flex-col opacity-20 blur-[2px] filter">
        <div class="bg-surface-container h-32 w-full rounded-xl"></div>
        <div class="bg-surface-container h-48 w-full rounded-xl"></div>
        <div class="bg-surface-container h-24 w-full rounded-xl"></div>
      </div>
      <!-- Dimmed Backdrop -->
      <div class="bg-inverse-surface/40 absolute inset-0 z-40 transition-opacity"></div>
      <!-- Bottom Sheet -->
      <div
        class="bg-surface-container-lowest absolute bottom-0 left-0 z-50 flex h-[65%] w-full translate-y-0 transform flex-col rounded-t-[20px] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] transition-transform duration-300"
      >
        <!-- Drag Handle Area -->
        <div
          class="pt-sm pb-md flex w-full cursor-grab items-center justify-center active:cursor-grabbing"
        >
          <div class="bg-outline-variant h-[4px] w-[36px] rounded-full"></div>
        </div>
        <!-- Sheet Header -->
        <div class="px-lg pb-md flex items-center justify-between">
          <h1 class="font-display-md text-on-surface text-display-md">Notifications</h1>
          <button
            class="bg-surface-container hover:bg-surface-container-high text-on-surface-variant flex h-8 w-8 items-center justify-center rounded-full transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">close</span>
          </button>
        </div>
        <!-- Notification List -->
        <div class="px-md pb-xl gap-sm scrollbar-hide flex flex-1 flex-col overflow-y-auto">
          <!-- Notification Item 1 -->
          <div
            class="bg-surface-container-lowest hover:bg-surface-container-low group relative flex cursor-pointer gap-3 rounded-[12px] border border-[#E8E2D6] p-3 transition-colors"
          >
            <div
              class="bg-surface-container flex h-[36px] w-[36px] shrink-0 items-center justify-center rounded-full"
            >
              <span
                class="material-symbols-outlined text-primary text-[20px]"
                style="font-variation-settings: 'FILL' 1"
                >ac_unit</span
              >
            </div>
            <div class="flex min-w-0 flex-1 flex-col justify-center pr-8">
              <h3 class="font-body text-on-surface truncate text-body font-bold">
                Wireless headphones
              </h3>
              <p class="font-caption text-on-surface-variant mt-[2px] text-caption">
                Ready for a decision
              </p>
              <p class="font-body-sm text-on-surface-variant mt-1 text-body-sm">€89.00</p>
            </div>
            <div class="absolute right-3 top-3">
              <span class="font-caption text-outline text-caption">2h ago</span>
            </div>
          </div>
          <!-- Notification Item 2 -->
          <div
            class="bg-surface-container-lowest hover:bg-surface-container-low group relative flex cursor-pointer gap-3 rounded-[12px] border border-[#E8E2D6] p-3 transition-colors"
          >
            <div
              class="bg-surface-container flex h-[36px] w-[36px] shrink-0 items-center justify-center rounded-full"
            >
              <span
                class="material-symbols-outlined text-primary text-[20px]"
                style="font-variation-settings: 'FILL' 1"
                >ac_unit</span
              >
            </div>
            <div class="flex min-w-0 flex-1 flex-col justify-center pr-8">
              <h3 class="font-body text-on-surface truncate text-body font-bold">
                Mountain bike helmet
              </h3>
              <p class="font-caption text-on-surface-variant mt-[2px] text-caption">
                Ready for a decision
              </p>
              <p class="font-body-sm text-on-surface-variant mt-1 text-body-sm">€124.00</p>
            </div>
            <div class="absolute right-3 top-3">
              <span class="font-caption text-outline text-caption">8h ago</span>
            </div>
          </div>
          <!-- Notification Item 3 -->
          <div
            class="bg-surface-container-lowest hover:bg-surface-container-low group relative flex cursor-pointer gap-3 rounded-[12px] border border-[#E8E2D6] p-3 transition-colors"
          >
            <div
              class="bg-surface-container flex h-[36px] w-[36px] shrink-0 items-center justify-center rounded-full"
            >
              <span
                class="material-symbols-outlined text-primary text-[20px]"
                style="font-variation-settings: 'FILL' 1"
                >ac_unit</span
              >
            </div>
            <div class="flex min-w-0 flex-1 flex-col justify-center pr-8">
              <h3 class="font-body text-on-surface truncate text-body font-bold">
                Vinyl record player
              </h3>
              <p class="font-caption text-on-surface-variant mt-[2px] text-caption">
                Ready for a decision
              </p>
              <p class="font-body-sm text-on-surface-variant mt-1 text-body-sm">€340.00</p>
            </div>
            <div class="absolute right-3 top-3">
              <span class="font-caption text-outline text-caption">1d ago</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
