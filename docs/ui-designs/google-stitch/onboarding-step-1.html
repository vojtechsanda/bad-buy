  <body class="text-on-surface font-body-md flex h-screen flex-col overflow-hidden antialiased">
    <!-- SHELL: Top Area & Progress -->
    <header class="pt-safe flex flex-col bg-[#FCFAF8] dark:bg-stone-950">
      <!-- TopAppBar from JSON -->
      <div
        class="flex h-16 w-full items-center justify-between border-b border-stone-200/50 px-5 transition-colors duration-200 ease-in-out dark:border-stone-800/50"
      >
        <button
          class="rounded-full p-2 text-[#3E8F7C] transition-colors duration-200 ease-in-out hover:bg-stone-100 dark:text-[#52B29D] dark:hover:bg-stone-900"
          type="button"
        >
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0"
            >arrow_back</span
          >
        </button>
        <h1 class="text-on-surface font-['Manrope'] text-sm font-semibold tracking-wide">
          Step 4 of 4
        </h1>
        <div class="w-10"></div>
        <!-- Placeholder for balance -->
      </div>
      <!-- Progress Bar (Custom to requirement) -->
      <div class="flex w-full items-center gap-[4px] px-[20px] py-4">
        <div class="h-[4px] flex-1 rounded-full bg-[#3E8F7C]"></div>
        <div class="h-[4px] flex-1 rounded-full bg-[#3E8F7C]"></div>
        <div class="h-[4px] flex-1 rounded-full bg-[#3E8F7C]"></div>
        <div class="h-[4px] flex-1 rounded-full bg-[#3E8F7C]"></div>
      </div>
    </header>
    <!-- BODY -->
    <main class="flex-1 overflow-y-auto px-[20px] pb-32 pt-[32px]">
      <div class="mx-auto flex max-w-md flex-col">
        <h2 class="font-headline-lg text-headline-lg mb-2 text-[#2C2A26]">Got a code?</h2>
        <p class="font-body-md text-body-md text-[#6B6660]">
          Enter your promo or referral code to unlock 3 months of Premium.
        </p>
        <div class="mt-[48px]">
          <label class="sr-only" for="promo_code">Promo Code</label>
          <input
            class="font-mono h-[56px] w-full rounded-lg border border-[#E8E2D6] bg-white text-center text-[14px] font-semibold uppercase tracking-[0.1em] text-[#2C2A26] transition-all duration-200 focus:border-transparent focus:outline-none focus:ring-2 focus:ring-[#3E8F7C]"
            id="promo_code"
            type="text"
            value="K7M2QP"
          />
        </div>
        <div class="mt-[24px]">
          <p class="mx-auto max-w-[280px] text-center text-[13px] leading-[20px] text-[#6B6660]">
            Premium unlocks unlimited custom hobbies, custom freeze times, and the suggestion
            refresh.
          </p>
        </div>
      </div>
    </main>
    <!-- STICKY BOTTOM AREA -->
    <!-- BottomNavBar from JSON logic, adjusted for transactional state -->
    <footer
      class="fixed bottom-0 left-0 z-50 flex w-full flex-col items-center gap-4 rounded-t-2xl border-t border-stone-200/50 bg-[#FCFAF8] px-6 py-8 pb-[calc(24px+env(safe-area-inset-bottom))] dark:border-stone-800/50 dark:bg-stone-950"
    >
      <div class="mx-auto flex w-full max-w-md flex-col gap-3">
        <button
          class="font-body-lg flex h-[52px] w-full items-center justify-center gap-2 rounded-xl bg-[#3E8F7C] text-body-lg font-bold text-[#FBF9F5] transition-transform duration-150 hover:opacity-90 active:scale-95"
        >
          Continue
          <span
            class="material-symbols-outlined text-[20px]"
            style="font-variation-settings: 'FILL' 0"
            >arrow_forward</span
          >
        </button>
        <button
          class="font-body-md flex h-[44px] w-full items-center justify-center gap-2 text-[15px] text-stone-500 transition-transform duration-150 hover:opacity-90 active:scale-95 dark:text-stone-400"
        >
          <span
            class="material-symbols-outlined text-[18px]"
            style="font-variation-settings: 'FILL' 0"
            >close</span

          Skip for now
        </button>
