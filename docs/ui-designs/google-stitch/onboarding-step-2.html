<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding Step 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-container-high': '#e6e9e6',
              'on-tertiary-container': '#fffbff',
              'on-tertiary-fixed': '#251a00',
              'on-secondary-fixed-variant': '#6f371e',
              primary: '#056857',
              'inverse-primary': '#86d6c0',
              'surface-tint': '#0c6b59',
              'surface-container-low': '#f1f4f1',
              'tertiary-fixed-dim': '#f0c03f',
              tertiary: '#745800',
              outline: '#6f7975',
              error: '#ba1a1a',
              'surface-container-highest': '#e0e3e0',
              'on-tertiary': '#ffffff',
              'on-primary': '#ffffff',
              background: '#f7faf7',
              'primary-fixed-dim': '#86d6c0',
              'on-surface': '#181c1b',
              'tertiary-container': '#927000',
              surface: '#f7faf7',
              secondary: '#8c4e33',
              'on-secondary-container': '#793f25',
              'on-primary-fixed': '#00201a',
              'on-secondary-fixed': '#360f00',
              'primary-container': '#2f826f',
              'on-error': '#ffffff',
              'outline-variant': '#bec9c4',
              'on-secondary': '#ffffff',
              'on-primary-container': '#f4fffa',
              'surface-container': '#ebefec',
              'surface-bright': '#f7faf7',
              'surface-variant': '#e0e3e0',
              'primary-fixed': '#a1f2dc',
              'inverse-on-surface': '#eef2ee',
              'on-tertiary-fixed-variant': '#5a4400',
              'on-background': '#181c1b',
              'secondary-fixed': '#ffdbcd',
              'tertiary-fixed': '#ffdf97',
              'surface-dim': '#d7dbd8',
              'on-primary-fixed-variant': '#005143',
              'inverse-surface': '#2d3130',
              'on-error-container': '#93000a',
              'secondary-fixed-dim': '#ffb596',
              'secondary-container': '#feae8c',
              'on-surface-variant': '#3f4945',
              'error-container': '#ffdad6',
              'surface-container-lowest': '#ffffff',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              xs: '4px',
              md: '16px',
              sm: '8px',
              unit: '4px',
              lg: '24px',
              'container-margin': '20px',
              gutter: '16px',
              xl: '40px',
            },
            fontFamily: {
              'label-caps': ['Manrope'],
              'display-xl': ['Manrope'],
              'body-md': ['Manrope'],
              'body-lg': ['Manrope'],
              'headline-lg': ['Manrope'],
              'headline-md': ['Manrope'],
            },
            fontSize: {
              'label-caps': [
                '12px',
                { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '700' },
              ],
              'display-xl': [
                '48px',
                { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '800' },
              ],
              'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'body-lg': ['18px', { lineHeight: '28px', fontWeight: '500' }],
              'headline-lg': [
                '32px',
                { lineHeight: '40px', letterSpacing: '-0.01em', fontWeight: '700' },
              ],
              'headline-md': ['24px', { lineHeight: '32px', fontWeight: '600' }],
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
      body {
        font-family: 'Manrope', sans-serif;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="bg-background text-on-background flex min-h-screen flex-col antialiased">
    <!-- TopAppBar from JSON (Modified for Onboarding structural constraints) -->
    <header
      class="docked full-width flat no shadows top-0 flex h-16 w-full items-center justify-between border-none bg-[#FAF9F6] px-5 dark:bg-stone-950">
      <button
        class="flex items-center justify-center rounded-full p-2 transition-colors duration-200 hover:bg-stone-100 dark:hover:bg-stone-900">
        <span class="material-symbols-outlined text-[#3E8F7C] dark:text-[#52B49C]">arrow_back</span>
      </button>
      <h1 class="font-label-caps text-label-caps text-on-surface flex-1 text-center">
        Step 1 of 3
      </h1>
      <div class="w-10"></div>
      <!-- Spacer for centering -->
    </header>
    <!-- Progress Bar -->
    <div class="px-container-margin py-md mx-auto w-full max-w-md">
      <div class="flex h-[4px] w-full gap-[4px]">
        <div class="bg-primary h-full flex-1 rounded-full"></div>
        <div class="bg-surface-container-high h-full flex-1 rounded-full"></div>
        <div class="bg-surface-container-high h-full flex-1 rounded-full"></div>
      </div>
    </div>
    <!-- Main Content Canvas -->
    <main
      class="px-container-margin mx-auto w-full max-w-md flex-1 overflow-y-auto pb-[120px] pt-[32px]">
      <div class="mb-[32px]">
        <h2 class="font-headline-md text-headline-md text-on-background mb-sm">
          Tell us about you
        </h2>
        <p class="font-body-md text-body-md text-on-surface-variant">
          We'll personalize your experience.
        </p>
      </div>
      <form class="flex flex-col gap-[24px]">
        <!-- Field A: Name -->
        <div class="gap-sm flex flex-col">
          <label class="font-body-md text-body-md text-on-surface-variant text-sm" for="name"
            >Your name</label
          >
          <input
            class="border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-primary font-body-md text-body-md placeholder-outline h-[48px] rounded-lg border px-[12px] outline-none transition-colors focus:ring-1"
            id="name"
            placeholder="How should we call you?"
            type="text" />
        </div>
        <!-- Field B: Birthdate -->
        <div class="gap-sm flex flex-col">
          <label
            class="font-body-md text-body-md text-on-surface-variant gap-xs flex cursor-pointer items-center text-sm">
            Birthdate
            <span
              class="material-symbols-outlined text-[14px] text-[#5B8DB8]"
              style="font-variation-settings: 'FILL' 0"
              >info</span
            >
          </label>
          <button
            class="border-outline-variant bg-surface-container-lowest hover:bg-surface-container flex h-[48px] items-center justify-between rounded-lg border px-[12px] transition-colors"
            type="button">
            <span class="font-body-md text-body-md text-outline">Select date</span>
            <span class="material-symbols-outlined text-on-surface-variant text-[16px]"
              >expand_more</span
            >
          </button>
        </div>
        <!-- Field C: Country -->
        <div class="gap-sm flex flex-col">
          <label
            class="font-body-md text-body-md text-on-surface-variant gap-xs flex cursor-pointer items-center text-sm">
            Country
            <span
              class="material-symbols-outlined text-[14px] text-[#5B8DB8]"
              style="font-variation-settings: 'FILL' 0"
              >info</span
            >
          </label>
          <button
            class="border-outline-variant bg-surface-container-lowest hover:bg-surface-container flex h-[48px] items-center justify-between rounded-lg border px-[12px] transition-colors"
            type="button">
            <span class="font-body-md text-body-md text-outline">Select your country</span>
            <span class="material-symbols-outlined text-on-surface-variant text-[16px]"
              >expand_more</span
            >
          </button>
        </div>
      </form>
    </main>
    <!-- BottomNavBar from JSON (Modified for Transactional Intent) -->
    <div
      class="flat no shadows fixed bottom-0 left-0 z-50 flex w-full flex-col border-t border-stone-100 bg-[#FAF9F6] px-5 pb-8 pt-4 dark:border-stone-900 dark:bg-stone-950">
      <button
        class="mx-auto mb-4 flex h-[52px] w-full max-w-md cursor-not-allowed items-center justify-center rounded-lg bg-[#3E8F7C] px-8 py-3 font-['Manrope'] text-base font-bold text-white opacity-50 transition-transform duration-150 hover:opacity-90 active:scale-95"
        disabled="">
        Continue
        <span class="material-symbols-outlined ml-2" data-icon="arrow_forward">arrow_forward</span>
      </button>
    </div>
  </body>
</html>
