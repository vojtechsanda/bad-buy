<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Onboarding Step 3 - Personalize Your Journey</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'tertiary-fixed': '#ffdf97',
              'surface-dim': '#d7dbd8',
              'on-secondary-container': '#793f25',
              background: '#f7faf7',
              tertiary: '#745800',
              'outline-variant': '#bec9c4',
              'on-secondary-fixed': '#360f00',
              'surface-bright': '#f7faf7',
              'primary-fixed-dim': '#86d6c0',
              'primary-fixed': '#a1f2dc',
              surface: '#f7faf7',
              'on-tertiary-fixed-variant': '#5a4400',
              'on-primary-fixed-variant': '#005143',
              'tertiary-fixed-dim': '#f0c03f',
              'secondary-fixed': '#ffdbcd',
              'secondary-fixed-dim': '#ffb596',
              'on-tertiary-container': '#fffbff',
              'on-secondary': '#ffffff',
              'on-primary-fixed': '#00201a',
              'on-primary': '#ffffff',
              'secondary-container': '#feae8c',
              'on-error-container': '#93000a',
              'surface-container-lowest': '#ffffff',
              primary: '#056857',
              'error-container': '#ffdad6',
              'on-background': '#181c1b',
              'surface-variant': '#e0e3e0',
              'surface-container-low': '#f1f4f1',
              'on-tertiary': '#ffffff',
              'on-secondary-fixed-variant': '#6f371e',
              'inverse-surface': '#2d3130',
              'on-primary-container': '#f4fffa',
              'tertiary-container': '#927000',
              error: '#ba1a1a',
              'on-error': '#ffffff',
              'surface-tint': '#0c6b59',
              'on-surface-variant': '#3f4945',
              'inverse-primary': '#86d6c0',
              secondary: '#8c4e33',
              'surface-container-high': '#e6e9e6',
              'surface-container': '#ebefec',
              outline: '#6f7975',
              'on-tertiary-fixed': '#251a00',
              'surface-container-highest': '#e0e3e0',
              'on-surface': '#181c1b',
              'primary-container': '#2f826f',
              'inverse-on-surface': '#eef2ee',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            spacing: {
              md: '16px',
              'container-margin': '20px',
              xl: '40px',
              sm: '8px',
              lg: '24px',
              gutter: '16px',
              unit: '4px',
              xs: '4px',
            },
            fontFamily: {
              'label-caps': ['Manrope'],
              'body-md': ['Manrope'],
              'headline-md': ['Manrope'],
              'display-xl': ['Manrope'],
              'body-lg': ['Manrope'],
              'headline-lg': ['Manrope'],
            },
            fontSize: {
              'label-caps': [
                '12px',
                { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '700' },
              ],
              'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'headline-md': ['24px', { lineHeight: '32px', fontWeight: '600' }],
              'display-xl': [
                '48px',
                { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '800' },
              ],
              'body-lg': ['18px', { lineHeight: '28px', fontWeight: '500' }],
              'headline-lg': [
                '32px',
                { lineHeight: '40px', letterSpacing: '-0.01em', fontWeight: '700' },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body-md flex min-h-screen flex-col items-center antialiased">
    <div
      class="bg-surface-container-lowest relative flex min-h-screen w-full max-w-[390px] flex-col shadow-sm">
      <!-- Top App Bar equivalent from Shared Components JSON with Contextual intent -> Onboarding overrides Nav Shell -->
      <header
        class="border-surface-container top-0 flex h-16 w-full w-full shrink-0 items-center border-b px-[20px]">
        <button
          class="text-primary hover:bg-surface-container-low -ml-2 rounded-full p-2 transition-colors active:scale-95">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="flex flex-1 items-center gap-1 px-4">
          <div class="bg-primary h-1 flex-1 rounded-full"></div>
          <div class="bg-primary h-1 flex-1 rounded-full"></div>
          <div class="bg-primary h-1 flex-1 rounded-full"></div>
        </div>
        <div class="w-10"></div>
        <!-- Spacer for balance -->
      </header>
      <!-- Main Content Canvas -->
      <main class="flex-1 overflow-y-auto px-[20px] pb-[100px] pt-[32px]">
        <h1 class="font-headline-lg text-headline-lg text-on-background mb-sm">
          What are you into?
        </h1>
        <p class="font-body-md text-body-md text-on-surface-variant mb-lg">
          Pick at least 3. We'll use these to suggest alternatives — like 'this jacket = 4
          climbing-gym sessions'.
        </p>
        <div class="mb-md flex justify-end">
          <span class="font-label-caps text-label-caps text-primary">4 / minimum 3 selected</span>
        </div>
        <!-- Hobby Grid -->
        <div class="space-y-xl">
          <!-- Category: Sports -->
          <section>
            <h2 class="font-headline-md text-on-background mb-md text-body-lg">Sports</h2>
            <div class="gap-sm flex flex-wrap">
              <!-- Selected Chip -->
              <button
                class="bg-primary text-on-primary flex items-center gap-2 rounded-full px-4 py-2 transition-transform active:scale-95">
                <span class="material-symbols-outlined text-[18px]">directions_bike</span>
                <span class="font-body-lg text-[15px]">Cycling</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]"
                  >directions_run</span
                >
                <span class="font-body-lg text-[15px]">Running</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]"
                  >self_improvement</span
                >
                <span class="font-body-lg text-[15px]">Yoga</span>
              </button>
              <!-- Selected Chip -->
              <button
                class="bg-primary text-on-primary flex items-center gap-2 rounded-full px-4 py-2 transition-transform active:scale-95">
                <span class="material-symbols-outlined text-[18px]">hiking</span>
                <span class="font-body-lg text-[15px]">Hiking</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]">landscape</span>
                <span class="font-body-lg text-[15px]">Climbing</span>
              </button>
            </div>
          </section>
          <!-- Category: Music -->
          <section>
            <h2 class="font-headline-md text-on-background mb-md text-body-lg">Music</h2>
            <div class="gap-sm flex flex-wrap">
              <!-- Selected Chip -->
              <button
                class="bg-primary text-on-primary flex items-center gap-2 rounded-full px-4 py-2 transition-transform active:scale-95">
                <span class="material-symbols-outlined text-[18px]">music_note</span>
                <span class="font-body-lg text-[15px]">Guitar</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]">piano</span>
                <span class="font-body-lg text-[15px]">Piano</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]">mic</span>
                <span class="font-body-lg text-[15px]">Singing</span>
              </button>
            </div>
          </section>
          <!-- Category: Food -->
          <section>
            <h2 class="font-headline-md text-on-background mb-md text-body-lg">Food</h2>
            <div class="gap-sm flex flex-wrap">
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]">restaurant</span>
                <span class="font-body-lg text-[15px]">Cooking</span>
              </button>
              <!-- Selected Chip -->
              <button
                class="bg-primary text-on-primary flex items-center gap-2 rounded-full px-4 py-2 transition-transform active:scale-95">
                <span class="material-symbols-outlined text-[18px]">local_cafe</span>
                <span class="font-body-lg text-[15px]">Coffee</span>
              </button>
              <!-- Default Chip -->
              <button
                class="bg-surface-container-lowest border-outline-variant text-on-background hover:bg-surface-container-low flex items-center gap-2 rounded-full border px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-primary text-[18px]">wine_bar</span>
                <span class="font-body-lg text-[15px]">Wine</span>
              </button>
            </div>
          </section>
          <!-- Promo Code Link -->
          <div class="pt-md pb-xl">
            <a
              class="font-body-md text-body-md text-primary decoration-primary/30 hover:decoration-primary underline transition-colors"
              href="#"
              >I have a promo code</a
            >
          </div>
        </div>
      </main>
      <!-- Sticky Bottom Action -->
      <div
        class="bg-surface-container-lowest border-surface-container pb-safe fixed bottom-0 z-50 w-full max-w-[390px] border-t p-[20px]">
        <button
          class="bg-primary text-on-primary font-body-lg flex h-[52px] w-full items-center justify-center gap-2 rounded-xl text-body-lg transition-transform active:scale-[0.98]">
          <span>Continue</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>
  </body>
</html>
