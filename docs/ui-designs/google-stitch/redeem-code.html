<!doctype html>

    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }

  <body
    class="bg-background font-body text-on-background relative flex h-screen w-full flex-col items-center justify-center overflow-hidden"
  >
    <!-- Mock Background App Content (to show dimming effect) -->
    <div class="bg-surface absolute inset-0 mx-auto flex h-full w-full max-w-[400px] flex-col">
      <!-- TopAppBar -->
      <header
        class="mx-auto flex h-16 w-full max-w-7xl items-center justify-between border-b border-stone-200 bg-white px-4"
      >
        <button
          class="flex h-10 w-10 items-center justify-center rounded-full text-stone-500 transition-colors hover:bg-stone-100"
        >
          <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
        <h1 class="font-manrope text-lg font-extrabold font-semibold tracking-tight text-teal-700">
          Redeem Code
        </h1>
        <div class="h-10 w-10"></div>
        <!-- Spacer for centering -->
      </header>
      <!-- Main Content Area -->
      <main class="p-md gap-lg flex flex-1 flex-col items-center justify-center opacity-30">
        <div
          class="bg-surface-variant border-outline-variant/30 flex h-32 w-full items-center justify-center rounded-xl border"
        >
          <span class="font-body text-on-surface-variant">App Content</span>
        </div>
        <div
          class="bg-surface-variant border-outline-variant/30 flex h-48 w-full items-center justify-center rounded-xl border"
        >
          <span class="font-body text-on-surface-variant">More Content</span>
        </div>
      </main>
    </div>
    <!-- Backdrop Overlay -->
    <div class="bg-on-surface/40 absolute inset-0 z-40 mx-auto w-full max-w-[400px]"></div>
    <!-- Bottom Sheet -->
    <div
      class="bg-surface-container-lowest absolute bottom-0 left-0 right-0 z-50 mx-auto flex max-h-[442px] w-full max-w-[400px] translate-y-0 transform flex-col rounded-t-[20px] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] transition-transform duration-300 ease-out"
    >
      <!-- Drag Handle -->
      <div class="pt-sm pb-md flex w-full justify-center">
        <div class="bg-outline-variant h-[4px] w-[36px] rounded-full"></div>
      </div>
      <!-- Sheet Content Container -->
      <div class="px-lg pb-lg flex flex-1 flex-col overflow-y-auto">
        <!-- Header Section -->
        <div class="mb-lg">
          <h2 class="font-display-md text-primary mb-xs text-display-md">Redeem a code</h2>
          <p class="font-body text-on-surface-variant text-body">
            Enter a referral or promo code to unlock 3 months of Premium.
          </p>
        </div>
        <!-- Input Section -->
        <div class="mb-xl flex flex-1 flex-col justify-center">
          <div class="relative w-full">
            <input
              class="bg-surface-container-lowest border-outline-variant font-mono text-on-surface focus:border-primary focus:ring-primary h-[56px] w-full rounded-xl border text-center text-[14px] uppercase tracking-[0.2em] transition-colors focus:outline-none focus:ring-1"
              placeholder="ENTER CODE"
              type="text"
              value="K7M2QP"
            />
          </div>
        </div>
        <!-- Action Section -->
        <div class="pt-md mt-auto">
          <button
            class="bg-primary text-on-primary font-body hover:bg-primary-container hover:text-on-primary-container flex h-[52px] w-full items-center justify-center rounded-[12px] text-body font-semibold shadow-sm transition-colors active:scale-[0.98]"
          >
            Redeem
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
