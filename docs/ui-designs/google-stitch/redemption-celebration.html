<!doctype html>

<html lang="en" style="width: 390px">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Redemption Success</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />

    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'inverse-on-surface': '#eef2ee',
              'on-primary': '#ffffff',
              'surface-bright': '#f7faf7',
              'primary-container': '#2f826f',
              'error-container': '#ffdad6',
              'on-surface-variant': '#3f4945',
              secondary: '#8c4e33',
              'secondary-fixed-dim': '#ffb596',
              'tertiary-fixed': '#ffdad4',
              'surface-container-low': '#f1f4f1',
              error: '#ba1a1a',
              'on-surface': '#181c1b',
              'tertiary-fixed-dim': '#ffb4a6',
              'surface-variant': '#e0e3e0',
              'on-tertiary-container': '#fffbff',
              primary: '#056857',
              'tertiary-container': '#aa6053',
              'surface-container': '#ebefec',
              'secondary-container': '#feae8c',
              'primary-fixed': '#a1f2dc',
              'on-error': '#ffffff',
              'on-background': '#181c1b',
              'outline-variant': '#bec9c4',
              'on-tertiary-fixed-variant': '#733429',
              'on-primary-fixed': '#00201a',
              'secondary-fixed': '#ffdbcd',
              background: '#f7faf7',
              tertiary: '#8d483c',
              'surface-container-highest': '#e0e3e0',
              'on-secondary': '#ffffff',
              'on-error-container': '#93000a',
              'on-secondary-fixed': '#360f00',
              'inverse-surface': '#2d3130',
              'surface-container-high': '#e6e9e6',

              'primary-fixed-dim': '#86d6c0',
              'on-secondary-fixed-variant': '#6f371e',
              'inverse-primary': '#86d6c0',
              'on-primary-container': '#f4fffa',
              'on-tertiary': '#ffffff',
              'surface-container-lowest': '#ffffff',
              outline: '#6f7975',
              'surface-dim': '#d7dbd8',
              'surface-tint': '#0c6b59',
              'on-tertiary-fixed': '#3a0a04',
              'on-secondary-container': '#793f25',

            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
              sheet: '20px',
            },
            spacing: {
              sm: '8px',
              xs: '4px',
              xl: '48px',
              lg: '24px',
              md: '16px',
            },
            fontFamily: {
              body: ['Manrope'],
              caption: ['Manrope'],
              'body-sm': ['Manrope'],
              'display-lg': ['Manrope'],
              'display-md': ['Manrope'],
            },
            fontSize: {
              body: ['15px', { lineHeight: '22px', fontWeight: '400' }],
              caption: ['11px', { lineHeight: '16px', letterSpacing: '0.08em', fontWeight: '600' }],
              'body-sm': ['13px', { lineHeight: '20px', fontWeight: '400' }],
              'display-lg': ['28px', { lineHeight: '36px', fontWeight: '800' }],
              'display-md': ['22px', { lineHeight: '30px', fontWeight: '700' }],
            },
          },

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background font-body text-on-surface relative min-h-screen overflow-hidden antialiased"
  >
    <!-- Simulated App Content in Background -->
    <div class="p-md mx-auto flex h-full w-full max-w-md flex-col">
      <div class="bg-surface-container-low mb-md h-16 w-full animate-pulse rounded-lg"></div>
      <div class="bg-surface-container-low mb-md h-48 w-full animate-pulse rounded-lg"></div>
      <div class="bg-surface-container-low mb-md h-32 w-full animate-pulse rounded-lg"></div>
    </div>
    <!-- Backdrop Dimmer -->
    <div class="fixed inset-0 z-40 bg-[#2C2A26]/40 transition-opacity duration-300"></div>
    <!-- Bottom Sheet Container -->
    <div
      class="fixed inset-x-0 bottom-0 z-50 mx-auto w-full max-w-md translate-y-0 transform transition-transform duration-300 ease-out"
    >
      <!-- Sheet Surface -->
      <div
        class="bg-surface-container-lowest rounded-t-sheet p-lg pt-sm pb-xl flex flex-col items-center shadow-[0_-4px_24px_rgba(0,0,0,0.08)]"
      >
        <!-- Drag Handle -->
        <div class="bg-outline-variant mb-md h-1 w-9 rounded-full opacity-60"></div>
        <!-- Celebration Icon -->
        <div class="mb-md mt-sm">
          <!-- Using a visually close Material Symbol for Lucide Sparkles request -->
          <span
            class="material-symbols-outlined text-[64px] text-[#F9C846]"
            style="font-variation-settings: 'FILL' 1"
          >
            stars
          </span>
        </div>
        <!-- Headline -->
        <h2 class="font-display-md text-on-surface mb-sm text-center text-display-md">
          🎉 Premium unlocked
        </h2>
        <!-- Primary Caption -->
        <!-- Note: closest to requested body-lg (16/24/600) using available system tokens or inline class for exact match -->
        <p
          class="font-body text-on-surface mb-xs text-center text-[16px] font-semibold leading-[24px]"
        >
          3 months of Premium added to your account.
        </p>
        <!-- Secondary Caption -->
        <p class="font-body text-outline mb-lg text-center text-body">
          You now have 90 days of Premium.
        </p>
        <!-- Primary CTA Button -->
        <!-- Uses requested specific colors and radius from prompt, while mapping to system tokens where possible -->
        <button
          class="bg-primary text-on-primary font-body hover:bg-surface-tint active:bg-primary-fixed-variant flex h-[52px] w-full items-center justify-center rounded-xl text-[16px] font-semibold leading-[24px] transition-colors"
        >
          Awesome
        </button>
      </div>
    </div>
  </body>
</html>
