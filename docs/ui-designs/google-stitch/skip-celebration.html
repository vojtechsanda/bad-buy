  <body
    class="bg-background font-body-md text-on-surface relative flex min-h-screen flex-col items-center justify-between overflow-hidden">
    <!-- Confetti Overlay (Simulated with absolute positioned divs for static design) -->
    <div class="pointer-events-none absolute inset-0 z-0">
      <!-- Golden Yellow -->
      <div
        class="w-sm h-sm bg-tertiary-fixed-dim absolute left-[20%] top-[10%] rotate-45 transform rounded-sm opacity-80"></div>
      <div
        class="bg-tertiary-fixed-dim absolute left-[80%] top-[30%] h-3 w-3 rounded-full opacity-70"></div>
      <div
        class="w-md bg-tertiary-fixed-dim absolute left-[10%] top-[60%] h-2 -rotate-12 transform rounded-sm opacity-60"></div>
      <div
        class="w-sm h-sm bg-tertiary-fixed-dim absolute left-[70%] top-[80%] rotate-12 transform rounded-sm opacity-90"></div>
      <!-- Coral/Pink (Secondary Container approx) -->
      <div
        class="w-md h-md bg-secondary-container absolute left-[70%] top-[15%] rounded-full opacity-80"></div>
      <div
        class="bg-secondary-container absolute left-[25%] top-[45%] h-2 w-4 rotate-45 transform rounded-sm opacity-70"></div>
      <div
        class="w-sm h-sm bg-secondary-container absolute left-[85%] top-[75%] rotate-3 transform rounded-sm opacity-60"></div>
      <!-- Teal/Mint (Primary Fixed) -->
      <div
        class="bg-primary-fixed absolute left-[40%] top-[5%] h-3 w-3 rounded-full opacity-90"></div>
      <div
        class="w-md h-sm bg-primary-fixed absolute left-[10%] top-[25%] -rotate-45 transform rounded-sm opacity-70"></div>
      <div
        class="w-md h-md bg-primary-fixed absolute left-[85%] top-[55%] rounded-full opacity-80"></div>
      <div
        class="bg-primary-fixed absolute left-[30%] top-[85%] h-4 w-3 rotate-12 transform rounded-sm opacity-60"></div>
    </div>
    <!-- Main Content Container -->
    <main
      class="px-container-margin py-xl relative z-10 mx-auto flex w-full max-w-md flex-1 flex-col items-center justify-center">
      <!-- Illustration Area -->
      <div
        class="mb-lg relative flex aspect-square w-full max-w-[280px] items-center justify-center">
        <img
          alt="Illustration of a person in a peaceful victorious pose with arms raised and eyes closed, surrounded by soft organic shapes in sage and coral. The style is hand-drawn, minimalist, and joyful, fitting a modern financial mindfulness app. Bright light mode aesthetic with warm off-white background."
          class="h-full w-full rounded-full object-cover opacity-90 mix-blend-multiply"
          data-alt="Illustration of a person in a peaceful victorious pose with arms raised and eyes closed, surrounded by soft organic shapes in sage and coral. The style is hand-drawn, minimalist, and joyful, fitting a modern financial mindfulness app. Bright light mode aesthetic with warm off-white background."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSkAQ7YQDofYDlP74vLi2Sqqwv_vru-c9ftqKkqB6v_QRix2xiGE9tnvawlEyCw7PWTG61mmmLErIIaxzD3hwyNc8dknyrpmDpsgtJdDS7ROwMZTWltJAYlNEXWtbTlOsaYIsvDO5fT4T7J9VR9n_Z1j9I6RRZ2v9Yo9SipnG6iwoTrh2hRGwfEYQlZwDGCYa3Ozp9R2B0-UihzNueMwhNRRhSbN2jxM8q5u1weMEXwZEUPpybLTHeEvVTzdBCe6IpPXydKZKpQg" />
        <!-- Using a placeholder image with multiply blend to simulate an illustration on the light bg -->
      </div>
      <!-- Savings Text -->
      <div class="mb-xl text-center">
        <h1 class="font-display-xl text-primary-container mb-xs text-display-xl">+€89.00</h1>
        <p class="font-body-lg text-outline text-body-lg">saved on this one</p>
      </div>
      <!-- Level Up Card -->
      <div
        class="bg-surface-container-low p-md gap-md border-outline-variant mb-lg flex w-full items-center rounded-xl border">
        <div
          class="bg-primary-container flex h-12 w-12 shrink-0 items-center justify-center rounded-full">
          <span class="font-headline-md text-headline-md text-on-primary-container">6</span>
        </div>
        <div class="flex-1">
          <h3 class="font-body-lg text-on-surface text-body-lg">
            Level up! You're now L6 — Mindful
          </h3>
          <p class="font-body-md text-body-md text-on-surface-variant">Pausing before buying</p>
        </div>
      </div>
      <!-- Secondary Stat -->
      <p class="font-body-md text-body-md text-outline mb-xl text-center">
        €401.50 saved in the last 30 days
      </p>
    </main>
    <!-- Bottom CTA Container -->
    <div class="px-container-margin pb-container-margin pt-md z-10 mx-auto w-full max-w-md">
      <button
        class="bg-primary-container text-on-primary-container font-body-lg py-md w-full rounded-xl text-body-lg transition-transform active:scale-[0.98]">
        Continue
      </button>
    </div>
